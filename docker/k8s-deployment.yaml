apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-analytics
  namespace: default
  labels:
    app: agent-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-analytics
  template:
    metadata:
      labels:
        app: agent-analytics
    spec:
      # Use a ServiceAccount with Workload Identity for BigQuery access
      # serviceAccountName: agent-analytics-sa
      containers:
      - name: grafana
        image: gcr.io/${GCP_PROJECT}/agent-analytics:latest
        ports:
        - containerPort: 3000
        env:
        - name: GCP_PROJECT
          value: "your-project-id"
        - name: BQ_DATASET
          value: "adk_agent_logs"
        - name: BQ_TABLE
          value: "mosa_agent_events_v2"
        resources:
          limits:
            cpu: "1"
            memory: 2Gi
          requests:
            cpu: "500m"
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: agent-analytics-svc
spec:
  selector:
    app: agent-analytics
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer
